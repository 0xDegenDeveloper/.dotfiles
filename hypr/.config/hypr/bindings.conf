# Application bindings
$terminal = uwsm-app -- $TERMINAL
$browser = omarchy-launch-browser

# Omarchy defaults
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, I, Activity, exec, $terminal -e btop
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT, T, Telegram, exec, omarchy-launch-or-focus Telegram

# From omarchy
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus signal "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password
#bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"
#bindd = SUPER, RETURN, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
#bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
# From omarchy default, might be cool eventually
#bindd = SUPER SHIFT, D, Docker, exec, $terminal -e lazydocker
#bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus "^obsidian$" "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
#bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment

#bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
#bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
#bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
#bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
#bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"

########


# Close window
bindd = SUPER SHIFT, W, Close active window, killactive,


### Launch ###
unbind = SUPER SHIFT, N
bindd = SUPER SHIFT, N, Obsidian, exec, omarchy-launch-or-focus "^obsidian$" "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"

# Open browser
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private

# Open terminal
unbind = SUPER, RETURN
unbind = SUPER SHIFT, RETURN
unbind = SUPER SHIFT, C
bindd = SUPER SHIFT, C, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"

# Move focus
unbind = SUPER, DOWN
unbind = SUPER, UP
unbind = SUPER, LEFT
unbind = SUPER, RIGHT
unbind = CTRL SHIFT, J
unbind = CTRL SHIFT, K
unbind = CTRL SHIFT, H
unbind = CTRL SHIFT, L

bindd = CTRL SHIFT, J, Move focus down, movefocus, d
bindd = CTRL SHIFT, K, Move focus down, movefocus, u
bindd = CTRL SHIFT, H, Move focus down, movefocus, l
bindd = CTRL SHIFT, L, Move focus down, movefocus, r


#unbind = SUPER SHIFT, B
#bindsd = Shift_R, B, Browser, exec, $browser

# unbind = SUPER SHIFT ALT, B
# bindsd = Shift_L+Shift_R, B, Browser (private), exec, $browser --private
#unbind = SUPER, SPACE
bindd = SUPER SHIFT, A, Launch apps, exec, omarchy-launch-walker


# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu
unbind = SUPER, code:10
unbind = SUPER, code:11
unbind = SUPER, code:12
unbind = SUPER, code:13
unbind = SUPER, code:14
unbind = SUPER, code:15
unbind = SUPER, code:16
unbind = SUPER, code:17
unbind = SUPER, code:18
unbind = SUPER, code:19

bindd = CTRL, code:10, Switch to workspace 1, workspace, 1
bindd = CTRL, code:11, Switch to workspace 2, workspace, 2
bindd = CTRL, code:12, Switch to workspace 3, workspace, 3
bindd = CTRL, code:13, Switch to workspace 4, workspace, 4
bindd = CTRL, code:14, Switch to workspace 5, workspace, 5
bindd = CTRL, code:15, Switch to workspace 6, workspace, 6
bindd = CTRL, code:16, Switch to workspace 7, workspace, 7
bindd = CTRL, code:17, Switch to workspace 8, workspace, 8
bindd = CTRL, code:18, Switch to workspace 9, workspace, 9
bindd = CTRL, code:19, Switch to workspace 10, workspace, 10

